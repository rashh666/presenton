  vars:
    stage: outline
    content: >-
      Build a competitive analysis for your meditation app in the wellness space: landscape overview, SWOT for Calm/Headspace/Insight Timer, positioning map, messaging comparison, pricing tiers ($10-$15/mo), digital presence audit, your advantages, and differentiation strategy
    n_slides: auto-detect
    language: English
    tone: sales_pitch
    verbosity: standard
    instructions: ""
    additional_context: "Audience category (library metadata): For marketers."
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
  assert:
    - type: javascript
      value: |
        const o = typeof output === 'string' ? JSON.parse(output) : output;
        const slides = (o && o.slides) || [];
        if (slides.length < 6) return false;
        return slides.every(s => /(^|\n)##\s+/.test(s.content || ''));
    - type: llm-rubric
