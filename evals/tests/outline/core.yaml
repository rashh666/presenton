    source_id: P-021
  vars:
    stage: outline
    content: >-
      Build a 5th grade water cycle lesson where students create terrariums, observe condensation, then map the process before learning the official terms
    n_slides: auto-detect
    language: English
    tone: educational
    verbosity: standard
    instructions: ""
    additional_context: "Audience category (library metadata): For educators."
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
  assert:
    - type: javascript
      value: |
        const o = typeof output === 'string' ? JSON.parse(output) : output;
        const slides = (o && o.slides) || [];
        if (slides.length < 4) return false;
        const t = (slides.map(s => s.content || '')).join('\n').toLowerCase();
        return /water|cycle|condensation|evaporation|terrarium|precipitation|cloud/i.test(t) &&
