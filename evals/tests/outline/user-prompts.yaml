# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
#
# Same outline vars contract as tests/outline/core.yaml (see header there). Sampled rows:
#   python evals/scripts/sample_user_prompts_for_outline_eval.py --seed 42 --best 5 --poor 5
#
# tone: default|casual|professional|funny|educational|sales_pitch
# verbosity: concise|standard|text-heavy
#
# --- Best.csv (rich library prompts): expect depth, requested themes, coherent arc ---
- description: "[user-prompt-lib][best] P-082 — AI customer service PoC proposal"
  metadata:
    prompt_tier: best
    source_id: P-082
  vars:
    stage: outline
    content: >-
      Build a proof-of-concept proposal for your AI customer service tool: 30-day pilot with 1,000 tickets, dedicated implementation engineer, success criteria (30% faster resolution), and what full rollout looks like
    n_slides: auto-detect
    language: English
    tone: sales_pitch
    verbosity: standard
    instructions: ""
    additional_context: "Audience category (library metadata): For sales professionals."
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
  assert:
    - type: javascript
      value: |
        const o = typeof output === 'string' ? JSON.parse(output) : output;
        const slides = (o && o.slides) || [];
        if (slides.length < 5) return false;
        return slides.every(s => /(^|\n)##\s+/.test(s.content || ''));
    - type: llm-rubric
      threshold: 0.72
      value: >
        User content (verbatim brief): {{content}}
        Score 1 if the outline clearly structures a pilot/PoC story: scope (e.g. pilot window, ticket volume), implementation/support, success metrics, and a path to full rollout.
        Score 0 if it is a generic AI overview with no pilot structure or ignores the stated numbers as organizing anchors.

