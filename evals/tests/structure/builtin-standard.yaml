# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
# Real built-in **standard** template catalog: file://schemas/layouts/standard.json
# (regenerate with: cd servers/nextjs && npm run export-layout-eval-fixtures -- standard).
# layout_catalog_size / toc_layout_index must match schemas/layouts/standard.meta.json after regen.
- description: "[structure][standard] valid indices and slide count"
  vars:
    stage: structure
    n_slides: 4
    layout_json: file://schemas/layouts/standard.json
    layout_catalog_size: 11
    outline_slides_json: >-
      {"slides":[
        {"content":"## Why now\nMarket pull and regulatory clarity."},
        {"content":"## Product\n- Faster authoring\n- Safer defaults"},
        {"content":"## Proof\nPilot logos and one-line outcomes."},
        {"content":"## Ask\nPilot slots and evaluation criteria."}
      ]}
    instructions: "Pick layouts that fit each slide; vary designs when content allows."
  assert:
    - type: javascript
      value: |
        const o = JSON.parse(output);
        const n = Number("{{layout_catalog_size}}");
        return Array.isArray(o.slides) && o.slides.length === 4 &&
          o.slides.every(i => Number.isInteger(i) && i >= 0 && i < n);
    - type: llm-rubric
      threshold: 0.65
      value: >
        Layout catalog is the real Presenton **standard** group (see outline JSON). Output is layout indices only.
        Outline: {{outline_slides_json}}
        Score 1 if each index plausibly matches that slide's content (intro vs bullets vs proof vs CTA) and heavy image-only layouts are not used for text-only slides.
        Score 0 if choices are random, all identical despite varied content, or clearly incompatible with the schemas implied by the slide text.

- description: "[structure][standard] TOC slide maps to table-of-contents layout"
  vars:
    stage: structure
    n_slides: 1
    layout_json: file://schemas/layouts/standard.json
    layout_catalog_size: 11
    toc_layout_index: 9
    outline_slides_json: >-
      {"slides":[
        {"content":"## Agenda\n- Problem and market\n- Product overview\n- Traction and roadmap\n- Team and ask"}
      ]}
    instructions: "This slide is a table of contents; pick the dedicated TOC layout."
  assert:
    - type: javascript
      value: |
        const o = JSON.parse(output);
        const toc = Number("{{toc_layout_index}}");
        return Array.isArray(o.slides) && o.slides.length === 1 && o.slides[0] === toc;
    - type: llm-rubric
      threshold: 0.7
      value: >
        Outline is a table of contents. Catalog includes a TOC layout at index {{toc_layout_index}}.
        Score 1 if the chosen index is appropriate for a TOC slide. Score 0 otherwise.

- description: "[structure][standard] numeric markdown table → chart-capable layout"
  vars:
    stage: structure
    n_slides: 2
    layout_json: file://schemas/layouts/standard.json
    layout_catalog_size: 11
    chart_left_layout_index: 0
    outline_slides_json: >-
      {"slides":[
        {"content":"## Context\nShort narrative, no numbers."},
        {"content":"## Regional ARR\n| Region | ARR (USDm) | YoY |\n| NA | 42 | 18% |\n| EU | 31 | 12% |"}
      ]}
    instructions: "Second slide has a numeric table; prefer a chart-capable layout (chart + text) when it fits."
  assert:
    - type: javascript
      value: |
        const o = JSON.parse(output);
        const n = Number("{{layout_catalog_size}}");
        return Array.isArray(o.slides) && o.slides.length === 2 &&
          o.slides.every(i => Number.isInteger(i) && i >= 0 && i < n);
    - type: llm-rubric
      threshold: 0.65
      value: >
        Second outline slide contains a numeric markdown table. Catalog includes chart-left layout at index {{chart_left_layout_index}}.
        Score 1 if that slide uses a chart-oriented layout index. Score 0 if a non-chart layout is chosen for the numeric table slide.

- description: "[structure][standard] visual variety across a short arc"
  vars:
    stage: structure
    n_slides: 5
    layout_json: file://schemas/layouts/standard.json
    layout_catalog_size: 11
    outline_slides_json: >-
      {"slides":[
        {"content":"## OrbitNote\nLaunch title and promise."},
        {"content":"## Problem\nFragmented PRD and delivery tools."},
        {"content":"## Insight\nSpecs should live next to execution."},
        {"content":"## Product\nTour: backlog, review, release."},
        {"content":"## Proof + CTA\nBeta logos and waitlist."}
      ]}
    instructions: "Prefer visual variety; do not use one layout index for every slide unless unavoidable."
  assert:
    - type: javascript
      value: |
        const o = JSON.parse(output);
        const n = Number("{{layout_catalog_size}}");
        return Array.isArray(o.slides) && o.slides.length === 5 &&
          o.slides.every(i => Number.isInteger(i) && i >= 0 && i < n) &&
          new Set(o.slides).size >= 2;
