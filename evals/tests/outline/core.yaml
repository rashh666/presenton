# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
#
# Outline eval (max 12 cases): six curated rows from data/user-prompts/Best.csv and six from
# Poor.csv (balanced).
#
# Outline stage vars MUST mirror servers/fastapi/models/generate_presentation_request.py
# plus presentation.web_search and eval-only stage:
#
#   stage: outline                    # required by evals/provider.py (not HTTP API)
#   content: string                   # required (verbatim library prompt)
#   n_slides: int | null              # null => auto-detect slide count (same as API omit)
#   language: string | null           # null/empty => auto-detect (API optional)
#   tone: default|casual|professional|funny|educational|sales_pitch   # servers/fastapi/enums/tone.py
#   verbosity: concise|standard|text-heavy                            # servers/fastapi/enums/verbosity.py
#   instructions: string              # optional; use "" if none
#   additional_context: string        # optional; use "" if none
#   include_title_slide: bool
#   include_table_of_contents: bool
#   web_search: bool                   # API field; enables WebSearchTool in provider when true
#
# --- Best.csv (rich prompts): depth, headings, brief fidelity ---
- description: "[best][P-004] manufacturing discovery — process vs capacity"
  metadata:
    prompt_tier: best
    source_id: P-004
  vars:
    stage: outline
    content: >-
      Build a discovery presentation for a manufacturing client sorting whether supply chain delays are process issues or capacity problems
    n_slides: auto-detect
    language: English
    tone: professional
    verbosity: standard
    instructions: ""
    additional_context: "Audience category (library metadata): For consultants."
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
  assert:
    - type: javascript
      value: |
        const o = typeof output === 'string' ? JSON.parse(output) : output;
        const slides = (o && o.slides) || [];
        if (slides.length < 4) return false;
        const blob = (slides.map(s => s.content || '')).join('\n').toLowerCase();
        return /process|capacity|delay|supply/.test(blob) && /(^|\n)##\s+/.test(slides[0].content || '');
    - type: llm-rubric
      threshold: 0.7
      value: >
        User content: {{content}}
        Score 1 if the outline helps discriminate process vs capacity causes of delays (framing, evidence, decision paths), suitable for a client discovery deck.
        Score 0 if it only lists generic supply chain buzzwords without the process-vs-capacity thread.

- description: "[best][P-015] retail bank organizational transformation"
  metadata:
    prompt_tier: best
    source_id: P-015
  vars:
    stage: outline
    content: >-
      Create an organizational transformation presentation for your retail bank's executives: vision for digital-first banking, current vs. future state, roadmap with quick wins (mobile deposits in Q1), and how success gets measured
    n_slides: auto-detect
    language: English
    tone: professional
    verbosity: standard
    instructions: ""
    additional_context: "Audience category (library metadata): For consultants."
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
  assert:
    - &js_best_headings_min5
      type: javascript
      value: |
        const o = typeof output === 'string' ? JSON.parse(output) : output;
        const slides = (o && o.slides) || [];
        if (slides.length < 5) return false;
        return slides.every(s => /(^|\n)##\s+/.test(s.content || ''));
    - type: llm-rubric
      threshold: 0.72
      value: >
        User content: {{content}}
        Score 1 if the deck follows transformation logic: vision, current vs future, roadmap with at least one concrete quick win, and measurement of success.
        Score 0 if it is unrelated banking trivia or missing future state / metrics.

