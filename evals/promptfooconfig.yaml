# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Presenton outline generation eval (single entrypoint)"

# Export OPENAI_API_KEY (or your provider key) before running. Do not put secrets in this file.

env:
  LLM: openai
  OPENAI_MODEL: gpt-4o-mini

# One placeholder prompt: messages are assembled in provider.py from each test's vars.
prompts:
  - file://prompts/provider_placeholder.txt

providers:
  - id: file://provider.py
    label: presenton-llm

defaultTest:
  options:
    provider: openai:chat:gpt-4o-mini
  assert:
    - type: javascript
      value: |
        try {
          if (output == null) return false;
          if (typeof output === 'object') {
            JSON.parse(JSON.stringify(output));
            return true;
          }
          if (typeof output === 'string') {
            JSON.parse(output);
            return true;
          }
          return false;
        } catch (e) {
          return false;
        }
      description: "Valid JSON"

tests:
  # - file://tests/outline/core.yaml
  - file://tests/outline/rubric_quality.yaml
