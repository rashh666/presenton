      value: >
        User typed: {{content}}
        Score 1 if multiple slides emphasize downsides, risks, intermittency, cost, or grid/storage challenges rather than only cheerleading renewables.
        Score 0 if the outline is mostly benefits or ignores the disadvantages focus.

