- description: "[rubric][concise][visual content balance] quarterly metrics review"
  metadata:
    prompt_tier: good
    rubric_dimension: visual_content_balance
    field_coverage: concise_explicit
  vars:
    stage: outline
    content: >-
      Build a five-slide quarterly metrics review for department leads. Cover summary, three KPI trends,
      what changed operationally, priority risks, and next-quarter actions.
    n_slides: 5
    language: English
    tone: professional
    verbosity: concise
    instructions: "Keep each slide concise: no dense paragraphs, no more than five bullets per slide, and use a table only if it improves comparison."
    additional_context: "Audience: department leads with limited review time."
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
  assert:
    - *js_exact5_headings
    - &js_not_overloaded
      type: javascript
      value: |
        const o = typeof output === 'string' ? JSON.parse(output) : output;
        const slides = (o && o.slides) || [];
        return slides.every(s => {
          const c = s.content || '';
          const bulletCount = (c.match(/(^|\n)\s*[-*]\s+/g) || []).length;
          const longParagraph = c.split(/\n+/).some(line => line.trim().length > 280);
          return bulletCount <= 6 && !longParagraph;
        });
    - type: llm-rubric
      threshold: 0.72
      value: >-
        User brief: {{content}}
        Score 1 if the outline is slide-ready: concise headings, scannable bullets, no overloaded paragraphs,
        and enough concrete direction for metrics review slides.
        Score 0 if it is text-heavy, vague, visually impractical, or packs too many competing ideas per slide.

