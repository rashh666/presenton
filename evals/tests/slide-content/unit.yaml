# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
- description: "[slide_content] required fields and schema adherence"
  vars:
    stage: slide_content
    language: English
    tone: professional
    verbosity: standard
    instructions: "Populate all required fields with substantive content."
    response_schema_json: '{"type":"object","properties":{"headline":{"type":"string"},"body_markdown":{"type":"string"},"__speaker_note__":{"type":"string","minLength":40,"maxLength":500}},"required":["headline","body_markdown","__speaker_note__"]}'
    slide_markdown: >-
      ## Reliability update
      Summarize that incident volume stayed flat while MTTR improved after
      runbook automation and paging policy changes.
  assert:
    - type: javascript
      value: |
        const o = JSON.parse(output);
        return typeof o.headline === 'string' &&
               typeof o.body_markdown === 'string' &&
               typeof o.__speaker_note__ === 'string' &&
               o.__speaker_note__.length >= 40;

- description: "[slide_content] analytics tokens preserved"
  vars:
    stage: slide_content
    language: English
    tone: analytical
    verbosity: standard
    instructions: "Include allowed source metrics, avoid adding new numbers."
    response_schema_json: '{"type":"object","properties":{"headline":{"type":"string"},"body_markdown":{"type":"string"},"__speaker_note__":{"type":"string","minLength":40,"maxLength":500}},"required":["headline","body_markdown","__speaker_note__"]}'
    slide_markdown: >-
      ## Physical risk and capital rotation
      Mention CO2 at 421 ppm (NOAA), warming 1.45C in 2023 (Copernicus),
      and clean energy investment at USD 1.7T (IEA). Do not add other metrics.
  assert:
    - type: javascript
      value: |
        const t = JSON.stringify(JSON.parse(output));
        return /421|1\.45|1\.7/i.test(t);
    - type: llm-rubric
      threshold: 0.7
      value: >
        Allowed quantitative references are 421 ppm, 1.45C, and USD 1.7T only.
        Slide markdown: {{slide_markdown}}
        Score 1 if output is faithful and does not add new numbers.

- description: "[slide_content] no hallucinated numbers in qualitative source"
  vars:
    stage: slide_content
    language: English
    tone: professional
    verbosity: standard
    instructions: "Stay qualitative and avoid all invented percentages/currency."
    response_schema_json: '{"type":"object","properties":{"headline":{"type":"string"},"body_markdown":{"type":"string"},"__speaker_note__":{"type":"string","minLength":40,"maxLength":500}},"required":["headline","body_markdown","__speaker_note__"]}'
    slide_markdown: >-
      ## Operations story
      Explain improved warehouse accuracy, expanded carrier coverage, and reduced
      complaint volume after proactive notifications. No quantitative disclosure.
  assert:
    - type: javascript
      value: |
        const t = JSON.stringify(JSON.parse(output));
        return !/(\$|€|£|\d+%|\d+\s*(million|billion|trillion))/i.test(t);

- description: "[slide_content] multilingual spanish output"
  vars:
    stage: slide_content
    language: Spanish
    tone: informativo
    verbosity: standard
    instructions: "Todo el contenido en espanol, incluyendo notas del presentador."
    response_schema_json: '{"type":"object","properties":{"headline":{"type":"string"},"body_markdown":{"type":"string"},"__speaker_note__":{"type":"string","minLength":40,"maxLength":500}},"required":["headline","body_markdown","__speaker_note__"]}'
    slide_markdown: >-
      ## Movilidad en America Latina
      Resumir micromovilidad, brechas de inversion y recomendaciones de politica.
  assert:
    - type: javascript
      value: |
        const t = JSON.stringify(JSON.parse(output)).toLowerCase();
        const tokens = [' de ', ' la ', ' en ', ' para ', ' movilidad '];
        return tokens.filter(token => t.includes(token)).length >= 4;

- description: "[slide_content] concise verbosity limits"
  vars:
    stage: slide_content
    language: English
    tone: business-casual
    verbosity: concise
    instructions: "Headline under 14 words and body under 70 words."
    response_schema_json: '{"type":"object","properties":{"headline":{"type":"string"},"body_markdown":{"type":"string"},"__speaker_note__":{"type":"string","minLength":40,"maxLength":500}},"required":["headline","body_markdown","__speaker_note__"]}'
    slide_markdown: >-
      ## Weekly startup update
      Cover dark mode launch, crash fixes, conversion wins, paused ads experiment,
      and next-week billing reliability focus.
  assert:
    - type: javascript
      value: |
        const o = JSON.parse(output);
        const hw = (o.headline || '').split(/\s+/).filter(Boolean).length;
        const bw = (o.body_markdown || '').split(/\s+/).filter(Boolean).length;
        return hw <= 14 && bw <= 70;
