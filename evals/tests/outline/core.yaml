    n_slides: auto-detect
    language: English
    tone: sales_pitch
    verbosity: standard
    instructions: ""
    additional_context: "Audience category (library metadata): For sales professionals."
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
  assert:
    - *js_best_headings_min5
    - type: llm-rubric
