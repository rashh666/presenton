- description: "[rubric][bad-no-instructions][structural quality] academic topic only"
  metadata:
    prompt_tier: bad
    rubric_dimension: structural_quality
    field_coverage: topic_only_no_instructions
  vars:
    stage: outline
    content: "photosynthesis"
    n_slides: auto-detect
    verbosity: standard
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
  assert:
    - *js_auto_headings_3_to_12
    - type: javascript
      value: |
        const o = typeof output === 'string' ? JSON.parse(output) : output;
        const text = ((o && o.slides) || []).map(s => s.content || '').join('\n').toLowerCase();
        return /photosynthesis|sunlight|carbon dioxide|water|glucose|oxygen|chlorophyll/.test(text);
    - type: llm-rubric
      threshold: 0.68
      value: >-
        User typed only: {{content}}
        Score 1 if the outline creates a sensible educational flow from definition to process to importance,
        without assuming a niche audience or inventing unrelated biology claims.
        Score 0 if it is too advanced, too shallow, or incoherent.

