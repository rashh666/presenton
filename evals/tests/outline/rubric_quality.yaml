# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
#
# Extreme real-world outline stress suite.
# These cases intentionally model how people actually prompt Presenton:
# vague topics, typo-heavy asks, omitted advanced fields, auto slide counts,
# slide counts hidden in content, default/null language or tone, no added context,
# pasted notes, qualitative-only briefs, and current-info/web-search scenarios.

- description: "[rubric][good-full][factual integrity] climate briefing source facts only"
  metadata:
    prompt_tier: good
    rubric_dimension: factual_integrity
    field_coverage: full_options
  vars:
    stage: outline
    content: >-
      Create an executive climate risk briefing using only these facts: atmospheric CO2 is 421 ppm,
      2023 warming reached 1.45C above pre-industrial levels, clean energy investment was USD 1.7T,
      and solar additions were 413 GW (+87%). Present risk first, then the investment response.
    n_slides: 5
    language: English
    tone: professional
    verbosity: standard
    instructions: "Exactly 5 slides. Do not add any other numbers, dates, source names, URLs, or citations."
    additional_context: "Audience category: executive leadership."
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
  assert:
    - &js_exact5_headings
      type: javascript
      value: |
        const o = typeof output === 'string' ? JSON.parse(output) : output;
        const slides = (o && o.slides) || [];
        return slides.length === 5 && slides.every(s => /(^|\n)##\s+/.test(s.content || ''));
    - type: javascript
      value: |
        const o = typeof output === 'string' ? JSON.parse(output) : output;
        const text = ((o && o.slides) || []).map(s => s.content || '').join('\n');
        return /421/.test(text) && /1\.45/.test(text) && /1\.7/.test(text) && /413/.test(text);
    - type: llm-rubric
      threshold: 0.74
      value: >-
        User brief: {{content}}
        Score 1 if the outline preserves the four supplied facts accurately, uses them in a coherent risk-to-response story,
        and does not introduce extra numbers, dates, source names, URLs, citations, or unsupported factual claims.
        Score 0 if any supplied number is changed, a key fact is omitted, or new factual detail is invented.

- description: "[rubric][bad-minimal][factual integrity] cybersecurity topic no invented specifics"
  metadata:
    prompt_tier: bad
    rubric_dimension: factual_integrity
    field_coverage: minimal_no_advanced_options
  vars:
    stage: outline
    content: "cybersecurity ppt"
    n_slides: auto-detect
    verbosity: standard
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
  assert:
    - &js_auto_headings_3_to_12
      type: javascript
      value: |
        const o = typeof output === 'string' ? JSON.parse(output) : output;
        const slides = (o && o.slides) || [];
        return slides.length >= 3 && slides.length <= 12 &&
          slides.every(s => /(^|\n)##\s+/.test(s.content || ''));
    - type: javascript
      value: |
        const o = typeof output === 'string' ? JSON.parse(output) : output;
        const text = ((o && o.slides) || []).map(s => s.content || '').join('\n');
        return !/CVE-\d{4}-\d+|SolarWinds|Equifax|Colonial Pipeline|\d+\s*(million|billion|%)/i.test(text);
    - type: llm-rubric
      threshold: 0.7
      value: >-
        User typed only: {{content}}
        Score 1 if the outline stays on general cybersecurity education or awareness and avoids invented breach names,
        CVE IDs, statistics, company incidents, or fake current claims.
        Score 0 if it hallucinates specific incidents or numbers from a vague prompt.

- description: "[rubric][bad-minimal][hallucination resistance] food pantry update no numbers"
  metadata:
    prompt_tier: bad
    rubric_dimension: hallucination_resistance
    field_coverage: no_instructions_no_context
  vars:
    stage: outline
    content: >-
      donor update food pantry. easier volunteer schedule. weekend distribution smoother.
      feedback form added. cold storage next.
    n_slides: auto-detect
    language: ""
    tone: ""
    verbosity: standard
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
  assert:
    - *js_auto_headings_3_to_12
    - &js_no_fabricated_numbers_or_sources
      type: javascript
      value: |
        const o = typeof output === 'string' ? JSON.parse(output) : output;
        const text = ((o && o.slides) || []).map(s => s.content || '').join('\n');
        return !/(\$|€|£|\d+\s*(%|percent|clients?|families|meals|pounds|lbs|k|million|billion|grant))/i.test(text) &&
          !/http|www\.|according to|study by|survey of/i.test(text);
    - type: llm-rubric
      threshold: 0.72
      value: >-
        User brief: {{content}}
        Score 1 if the outline turns the rough notes into a donor-ready qualitative update without inventing metrics,
        donations, named partners, quotes, testimonials, grants, URLs, or sources.
        Score 0 if it adds concrete impact claims not present in the user's note.

