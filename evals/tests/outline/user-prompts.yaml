- description: "[user-prompt-lib][best] P-032 — 3rd grade narrative writing workshop"
  metadata:
    prompt_tier: best
    source_id: P-032
  vars:
    stage: outline
    content: >-
      Design a narrative writing workshop for 3rd graders: writing goal (beginning, middle, end), mentor text example, story structure steps, word bank (exciting verbs, descriptive adjectives), guided practice, independent writing time, peer sharing, self-assessment, and publishing options
    n_slides: auto-detect
    language: English
    tone: educational
    verbosity: standard
    instructions: ""
    additional_context: "Audience category (library metadata): For educators."
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
  assert:
    - type: javascript
      value: |
        const o = typeof output === 'string' ? JSON.parse(output) : output;
        const slides = (o && o.slides) || [];
        if (slides.length < 5) return false;
        const t = (slides.map(s => s.content || '')).join('\n').toLowerCase();
        return /beginning|middle|end|story|narrative|writing|workshop|grade|peer|self-assessment|publish/i.test(t);
    - type: llm-rubric
      threshold: 0.72
      value: >
        User content: {{content}}
        Score 1 if the outline reads like a lesson/workshop flow covering structure, modeling/mentor text, practice, sharing, and assessment/publishing touchpoints appropriate for ~3rd grade.
        Score 0 if it is a generic essay deck for adults or skips most listed instructional elements.

