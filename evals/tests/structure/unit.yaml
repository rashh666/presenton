# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
# Shared catalog: file://schemas/layouts/eval-default.json (see evals/schemas/layouts/README.md)
- description: "[structure] table slide chooses table layout"
  vars:
    stage: structure
    n_slides: 3
    layout_json: file://schemas/layouts/eval-default.json
    outline_slides_json: >-
      {"slides":[
        {"content":"## Opening\nQuarterly review kickoff."},
        {"content":"## Highlights\n- Better retention\n- Better delivery speed"},
        {"content":"## Regional metrics\n| Region | ARR (USDm) | Growth |\n| NA | 42 | 18% |"}
      ]}
    instructions: "Choose table layout for slides containing markdown tables."
  assert:
    - type: javascript
      value: |
        const o = JSON.parse(output);
        return Array.isArray(o.slides) && o.slides.length === 3 && o.slides[2] === 2;
    - type: llm-rubric
      threshold: 0.7
      value: >
        Layout index 2 is the table layout. Outline: {{outline_slides_json}}
        Score 1 if table slide maps to index 2.

- description: "[structure] no-table outline avoids table layout"
  vars:
    stage: structure
    n_slides: 4
    layout_json: file://schemas/layouts/eval-default.json
    outline_slides_json: >-
      {"slides":[
        {"content":"## Why now\nQualitative market drivers."},
        {"content":"## Product approach\nNarrative bullets only."},
        {"content":"## Operational wins\nBullets no table."},
        {"content":"## Next steps\nShort roadmap summary."}
      ]}
    instructions: "Do not select table layout when no table is present."
  assert:
    - type: javascript
      value: |
        const o = JSON.parse(output);
        return Array.isArray(o.slides) && o.slides.length === 4 && !o.slides.includes(2);

- description: "[structure] varied marketing arc layout choices"
  vars:
    stage: structure
    n_slides: 5
    layout_json: file://schemas/layouts/eval-default.json
    outline_slides_json: >-
      {"slides":[
        {"content":"## OrbitNote launch\nHero title and promise."},
        {"content":"## Problem\nContext-switching story."},
        {"content":"## Insight\nPRD should live near engineering execution."},
        {"content":"## Product\nWorkflow tour in bullets."},
        {"content":"## Proof + CTA\nBeta social proof and waitlist close."}
      ]}
    instructions: "Prefer visual variety; avoid using a single layout index for all slides."
  assert:
    - type: javascript
      value: |
        const o = JSON.parse(output);
        return Array.isArray(o.slides) && o.slides.length === 5 && new Set(o.slides).size >= 2;

- description: "[structure] spanish policy deck structural validity"
  vars:
    stage: structure
    n_slides: 3
    layout_json: file://schemas/layouts/eval-default.json
    outline_slides_json: >-
      {"slides":[
        {"content":"## Contexto\nPanorama de movilidad urbana en la region."},
        {"content":"## Retos\nBrechas de inversion y ultima milla."},
        {"content":"## Politicas\nRecomendaciones para municipios."}
      ]}
    instructions: "Selecciona disenos coherentes con el contenido."
  assert:
    - type: javascript
      value: |
        const o = JSON.parse(output);
        return Array.isArray(o.slides) && o.slides.length === 3 && o.slides.every(i => Number.isInteger(i) && i >= 0 && i <= 2);

- description: "[structure] fixed slide count output shape"
  vars:
    stage: structure
    n_slides: 6
    layout_json: file://schemas/layouts/eval-default.json
    outline_slides_json: >-
      {"slides":[
        {"content":"## Threat landscape\nExecutive context"},
        {"content":"## Incident response\nRunbook outcomes"},
        {"content":"## Compliance\nAudit status"},
        {"content":"## Tooling roadmap\nPlanned upgrades"},
        {"content":"## Team plan\nHiring and training"},
        {"content":"## Budget narrative\nInvestment priorities"}
      ]}
    instructions: "Return one layout index per slide."
  assert:
    - type: javascript
      value: |
        const o = JSON.parse(output);
        return Array.isArray(o.slides) && o.slides.length === 6;
