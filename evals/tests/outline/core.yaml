# --- Poor.csv (vague prompts): sane slide count, headings, no fabricated data dumps ---
- description: "[poor][id 1] Cloud Computing (minimal)"
  metadata:
    prompt_tier: poor
    source_id: poor-1
  vars:
    stage: outline
    content: "need ppt for Cloud Computing"
    n_slides: auto-detect
    language: English
    tone: default
    verbosity: standard
    instructions: ""
    additional_context: ""
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
  assert:
    - &js_poor_vague_slide_bounds
      type: javascript
      value: |
        const o = typeof output === 'string' ? JSON.parse(output) : output;
        const slides = (o && o.slides) || [];
        if (slides.length < 3 || slides.length > 14) return false;
        return slides.every(s => /(^|\n)##\s+/.test(s.content || ''));
    - type: llm-rubric
      threshold: 0.68
      value: >
        User typed: {{content}}
        Score 1 if the outline stays on cloud computing themes for a general audience and does not invent specific product names, breach lists, or statistics not implied by the user.
        Score 0 if it hallucinates detailed figures or drifts to unrelated topics.

- description: "[poor][id 4] Renewable Energy — disadvantages focus"
  metadata:
    prompt_tier: poor
    source_id: poor-4
  vars:
    stage: outline
    content: "Renewable Energy presentation focus on disadvantages"
    n_slides: auto-detect
    language: English
    tone: default
    verbosity: standard
    instructions: ""
    additional_context: ""
    include_title_slide: true
    include_table_of_contents: false
    web_search: false
  assert:
    - type: javascript
      value: |
        const o = typeof output === 'string' ? JSON.parse(output) : output;
        const slides = (o && o.slides) || [];
        if (slides.length < 3 || slides.length > 14) return false;
        const t = (slides.map(s => s.content || '')).join('\n').toLowerCase();
        return /renewable|energy|solar|wind|grid|carbon|green|power|electric/i.test(t) &&
          /disadvantage|risk|limitation|downside|challenge|problem|intermittent|cost|storage/i.test(t);
    - type: llm-rubric
